<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Message</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  text-align: center;
  color: white;
  background: linear-gradient(135deg, #89f7fe, #66a6ff, #c3cfe2);
}

/* START BUTTON */
#startBtn {
  position: absolute;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 15px 25px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  background: white;
  color: black;
  cursor: pointer;
}

/* PARALLAX STARS */
.star {
  position: absolute;
  border-radius: 50%;
  background: white;
}

.star.far { width: 1px; height: 1px; opacity: 0.3; animation: moveFar linear infinite; }
.star.mid { width: 2px; height: 2px; opacity: 0.6; animation: moveMid linear infinite; }
.star.close { width: 3px; height: 3px; opacity: 1; animation: moveClose linear infinite; }

@keyframes moveFar { from {transform: translateY(-10px);} to {transform: translateY(100vh);} }
@keyframes moveMid { from {transform: translateY(-10px);} to {transform: translateY(100vh);} }
@keyframes moveClose { from {transform: translateY(-10px);} to {transform: translateY(100vh);} }

/* MOVIE TEXT */
#loveText {
  position: absolute;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 60px;
  font-weight: bold;
  opacity: 0;
  text-shadow: 0 0 15px #ff4d6d, 0 0 30px #ff4d6d, 0 0 60px #ff4d6d;
  animation: intro 4s ease-in-out forwards;
}

@keyframes intro {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
  30% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
  70% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(1.2); }
}

/* GIFT BOX */
#box {
  display: none;
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 90px;
  cursor: pointer;
}

/* HEARTS */
.heart {
  position: absolute;
  font-size: 22px;
  animation: floatUp 3s linear forwards;
}

@keyframes floatUp {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-300px); opacity: 0; }
}
</style>
</head>

<body>

<button id="startBtn">📩 Open Message</button>

<audio id="audio" src="voice.mp3"></audio>

<div id="loveText">Ruba بحبك ❤️</div>

<div id="box">🎁</div>

<script>
const audio = document.getElementById("audio");
const startBtn = document.getElementById("startBtn");
const loveText = document.getElementById("loveText");
const box = document.getElementById("box");

let audioFinished = false;

/* stars */
function createStars() {
  for (let i = 0; i < 160; i++) {
    let star = document.createElement("div");
    star.classList.add("star");

    let layer = Math.random();

    if (layer < 0.33) {
      star.classList.add("far");
      star.style.animationDuration = (Math.random() * 12 + 8) + "s";
    } else if (layer < 0.66) {
      star.classList.add("mid");
      star.style.animationDuration = (Math.random() * 8 + 5) + "s";
    } else {
      star.classList.add("close");
      star.style.animationDuration = (Math.random() * 5 + 3) + "s";
    }

    star.style.left = Math.random() * window.innerWidth + "px";
    star.style.top = Math.random() * window.innerHeight + "px";

    document.body.appendChild(star);
  }
}

/* START */
startBtn.onclick = () => {
  startBtn.style.display = "none";

  audio.play();
  createStars();

  loveText.style.display = "block";

  audio.onended = () => {
    audioFinished = true;
    loveText.style.display = "none";
    box.style.display = "block";
  };
};

/* BOX CLICK */
box.onclick = () => {
  if (!audioFinished) return;

  box.style.display = "none";

  for (let i = 0; i < 200; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.top = Math.random() * window.innerHeight + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 3000);
  }
};
</script>

</body>
</html>
