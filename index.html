<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  text-align: center;
  color: white;
  background: radial-gradient(circle at top, #1a1a40, #000);
}

/* start button */
#startBtn {
  position: absolute;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 15px 25px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  background: white;
  color: black;
  cursor: pointer;
}

/* stars */
.star {
  position: absolute;
  width: 3px;
  height: 3px;
  background: white;
  border-radius: 50%;
  animation: fall linear infinite;
}

@keyframes fall {
  from { transform: translateY(-10px); opacity: 1; }
  to { transform: translateY(100vh); opacity: 0; }
}

/* glowing text */
#loveText {
  position: absolute;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 55px;
  font-weight: bold;
  display: none;
  text-shadow: 0 0 10px #ff4d6d, 0 0 20px #ff4d6d, 0 0 40px #ff4d6d;
  animation: glowBlink 2s infinite;
}

@keyframes glowBlink {
  0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
  50%  { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
}

/* gift box */
#box {
  display: none;
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 90px;
  cursor: pointer;
}

/* hearts */
.heart {
  position: absolute;
  font-size: 22px;
  animation: floatUp 3s linear forwards;
}

@keyframes floatUp {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-300px); opacity: 0; }
}
</style>
</head>

<body>

<button id="startBtn">📩 Open Message</button>

<audio id="audio" src="voice.mp3"></audio>

<div id="loveText">Ruba بحبك ❤️</div>

<div id="box">🎁</div>

<script>
const audio = document.getElementById("audio");
const startBtn = document.getElementById("startBtn");
const loveText = document.getElementById("loveText");
const box = document.getElementById("box");

function createStars() {
  for (let i = 0; i < 120; i++) {
    let star = document.createElement("div");
    star.className = "star";
    star.style.left = Math.random() * window.innerWidth + "px";
    star.style.top = Math.random() * window.innerHeight + "px";
    star.style.animationDuration = (Math.random() * 3 + 2) + "s";
    document.body.appendChild(star);
  }
}

startBtn.onclick = () => {
  startBtn.style.display = "none";

  audio.play();
  createStars();

  // show glowing text immediately with audio
  loveText.style.display = "block";

  // when audio ends → show box
  audio.onended = () => {
    loveText.style.display = "none";
    box.style.display = "block";
  };
};

// box click → hearts explosion
box.onclick = () => {

  for (let i = 0; i < 150; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.top = Math.random() * window.innerHeight + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 3000);
  }
};
</script>

</body>
</html>
