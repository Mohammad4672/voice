<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial;
  text-align: center;
  color: white;
}

/* start button */
#startBtn {
  position: absolute;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 15px 25px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  background: white;
  color: black;
  cursor: pointer;
}

/* stars */
.star {
  position: absolute;
  width: 3px;
  height: 3px;
  background: white;
  border-radius: 50%;
  animation: fall linear infinite;
}

@keyframes fall {
  from { transform: translateY(-10px); opacity: 1; }
  to { transform: translateY(100vh); opacity: 0; }
}

/* box */
#box {
  display: none;
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 160px;
  height: 160px;
  background: #222;
  border: 2px solid white;
  border-radius: 15px;
  cursor: pointer;
}

#box::after {
  content: "🔒";
  font-size: 40px;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* hearts */
.heart {
  position: absolute;
  font-size: 20px;
  animation: floatUp 2s linear forwards;
}

@keyframes floatUp {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-200px); opacity: 0; }
}
</style>
</head>

<body>

<button id="startBtn">📩 Open Message</button>

<audio id="audio" src="voice.mp3"></audio>

<div id="box"></div>

<script>
const audio = document.getElementById("audio");
const startBtn = document.getElementById("startBtn");
const box = document.getElementById("box");

// start on click (important for iPhone)
startBtn.onclick = () => {
  startBtn.style.display = "none";

  audio.play();

  // stars
  for (let i = 0; i < 80; i++) {
    let star = document.createElement("div");
    star.className = "star";
    star.style.left = Math.random() * window.innerWidth + "px";
    star.style.top = Math.random() * window.innerHeight + "px";
    star.style.animationDuration = (Math.random() * 3 + 2) + "s";
    document.body.appendChild(star);
  }

  // show box when audio ends
  audio.onended = () => {
    box.style.display = "block";
  };
};

// box click → hearts
box.onclick = () => {
  for (let i = 0; i < 40; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = (window.innerWidth/2 + (Math.random()*200-100)) + "px";
    heart.style.top = (window.innerHeight/2) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 2000);
  }
};
</script>

</body>
</html>
